name: Disclosure Daily Engine

on:
  schedule:
    - cron: '0 11 * * *'  # 6:00 AM ET (UTC-5) / 7:00 AM EDT (UTC-4) — runs daily
  workflow_dispatch:       # Also allows manual "Run workflow" button

jobs:
  run-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 15    # Kill job automatically if it runs over 15 min

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Run actions/setup-node@v4
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm install
        run: npm install

      - name: Run node disclosure-daily-engine.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node disclosure-daily-engine.js
